services:
  minio:
    image: minio/minio:latest
    ports:
      - '9000:9000'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: 'no'
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; do
        sleep 1;
      done;
      mc mb local/cloud-attachment-test --ignore-existing;
      mc anonymous set download local/cloud-attachment-test;
      "
